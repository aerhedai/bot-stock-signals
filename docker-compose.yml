services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app/engines/stock_sniper/data:/app/app/engines/stock_sniper/data
      - ./backend/app/engines/crypto_sniper/data:/app/app/engines/crypto_sniper/data
      - ./backend/app/engines/news_monitor/data:/app/app/engines/news_monitor/data
      - ./stockai-489113-c747d6271068.json:/app/service-account.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  telegram-bot:
    build: ./telegram
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
